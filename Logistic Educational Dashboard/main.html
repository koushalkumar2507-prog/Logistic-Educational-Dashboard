<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CIA-1: Logistic Regression Interactive Learning System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for basic charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Plotly for decision boundary -->
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js" charset="utf-8"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- MathJax for LaTeX rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>
    <div class="dashboard">
        <h1>📊 Logistic Regression: Learn by Experimenting</h1>
        <div class="sub">Binary & Multi-class · Step-by-step math · Visualize decision boundary & probability</div>

        <!-- Pipeline navigation -->
        <div class="pipeline">
            <button class="step-btn" data-step="0">1. 📂 Data & Preprocessing</button>
            <button class="step-btn" data-step="1">2. 📈 EDA & Class Balance</button>
            <button class="step-btn" data-step="2">3. 🧠 Logistic Core (Math + Sigmoid)</button>
            <button class="step-btn" data-step="3">4. ⚙️ Train & Decision Boundary</button>
            <button class="step-btn" data-step="4">5. 🔮 Predict & Metrics</button>
        </div>

        <!-- Dynamic content area -->
        <div id="mainContent"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
